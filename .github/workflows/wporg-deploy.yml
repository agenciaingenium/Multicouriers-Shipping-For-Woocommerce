name: Deploy to WordPress.org

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to deploy (example: v1.0.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}

      - name: Ensure deploy script is executable
        run: chmod +x scripts/deploy-wordpress-org.sh

      - name: Deploy to WordPress.org SVN
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}
          WP_ORG_PLUGIN_SLUG: ${{ secrets.WP_ORG_PLUGIN_SLUG }}
          WP_ORG_SVN_USERNAME: ${{ secrets.WP_ORG_SVN_USERNAME }}
          WP_ORG_SVN_PASSWORD: ${{ secrets.WP_ORG_SVN_PASSWORD }}
        run: bash scripts/deploy-wordpress-org.sh
